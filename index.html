<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HHS Women's Health — Campaign Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"><\/script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f5;color:#111;-webkit-font-smoothing:antialiased}
.wrap{max-width:1280px;margin:0 auto;padding:24px}

.hdr{background:#111;border-radius:8px;padding:20px 28px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.hdr h1{font-size:20px;font-weight:800;color:#fff}
.hdr-sub{font-size:13px;color:#fff;opacity:.7;margin-top:2px}
.hdr-ts{font-size:11px;color:#fff;opacity:.5}

.ctrl{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.tabs{display:flex;gap:0;border:2px solid #111;border-radius:6px;overflow:hidden}
.tab{padding:10px 24px;font-size:13px;font-weight:700;color:#111;background:#fff;border:none;cursor:pointer}
.tab:not(:last-child){border-right:2px solid #111}
.tab:hover{background:#eee}
.tab.on{background:#111;color:#fff}

.date-ctrl{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.qbtn{padding:7px 13px;font-size:12px;font-weight:700;color:#111;background:#fff;border:2px solid #ccc;border-radius:6px;cursor:pointer}
.qbtn:hover{border-color:#111}
.qbtn.on{background:#111;color:#fff;border-color:#111}
.date-input{border:2px solid #ccc;background:#fff;color:#111;font-size:12px;font-weight:600;padding:7px 12px;border-radius:6px;width:200px;cursor:pointer;text-align:center}
.date-input:focus{border-color:#03a687;outline:none}

.pane{display:none}.pane.on{display:block}

.q{margin:28px 0 14px}
.q-title{font-size:20px;font-weight:900;color:#111}
.q-desc{font-size:14px;color:#333;margin-top:4px}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:24px}
.m{background:#fff;border-radius:8px;padding:22px;border:2px solid #ddd}
.m-label{font-size:13px;font-weight:800;color:#111;text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px}
.m-val{font-size:42px;font-weight:900;color:#111;line-height:1;letter-spacing:-2px}
.m-detail{font-size:13px;color:#333;margin-top:10px;line-height:1.5}
.m-bar{height:5px;background:#e5e5e5;border-radius:3px;margin-top:14px;overflow:hidden}
.m-bar-fill{height:100%;border-radius:3px}

.star-row{display:flex;align-items:baseline;gap:8px}
.stars{color:#b45309;font-size:22px;letter-spacing:2px}

.provs{margin-bottom:16px}
.prov-table{width:100%;border-collapse:collapse}
.prov-table td{padding:14px 16px;border-bottom:1px solid #e5e5e5;vertical-align:middle}
.prov-table tr:last-child td{border-bottom:none}
.prov-table tr:hover td{background:#fafafa}
.prov-photo{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid #ddd;vertical-align:middle}
.prov-name{font-size:14px;font-weight:800;color:#111}
.prov-role{font-size:12px;color:#555}
.prov-num{font-size:28px;font-weight:900;color:#03a687;text-align:right}
.prov-num-label{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;text-align:right}
.prov-barwrap{width:120px}
.prov-bartrack{height:6px;background:#e5e5e5;border-radius:3px;overflow:hidden}
.prov-barfill{height:100%;border-radius:3px;background:#03a687}
.nopref{background:#fff;border:2px solid #ddd;border-radius:8px;padding:14px 20px;margin-bottom:24px;font-size:14px;color:#111}
.nopref strong{font-weight:800}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.box{background:#fff;border-radius:8px;padding:22px;border:2px solid #ddd}
.box-title{font-size:15px;font-weight:800;color:#111;margin-bottom:2px}
.box-desc{font-size:13px;color:#333;margin-bottom:16px}
.ch{position:relative;height:260px}
.ch.sm{height:200px}

.stat-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:24px}
.stat-item{background:#fff;border:2px solid #ddd;border-radius:8px;padding:16px 20px;flex:1;min-width:180px}
.stat-item-label{font-size:12px;font-weight:800;color:#111;text-transform:uppercase;margin-bottom:6px}
.stat-item-val{font-size:22px;font-weight:900;color:#111}
.stat-item-note{font-size:12px;color:#333;margin-top:4px}

.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:12px;font-weight:800;color:#111;padding:12px 14px;border-bottom:2px solid #111;background:#fafafa}
.tbl td{padding:12px 14px;border-bottom:1px solid #e5e5e5;color:#111}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafafa}
.tbl .r{text-align:right;font-variant-numeric:tabular-nums}
.tbl .em{font-weight:800}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700}
.b-teal{background:#e0f5ef;color:#047857}
.b-dark{background:#e5e5e5;color:#333}
.b-amber{background:#fef3c7;color:#92400e}

.link{color:#03a687;font-weight:700;text-decoration:none}
.link:hover{text-decoration:underline}
.ftr{text-align:center;padding:32px;font-size:11px;color:#888}
@media(max-width:900px){.g2{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.wrap{padding:12px}.metrics{grid-template-columns:1fr}.ctrl{flex-direction:column;align-items:stretch}.hdr{flex-direction:column;text-align:center}.stat-row{flex-direction:column}}
</style>
</head>

<div class="hdr">

</div>

<div class="ctrl">
